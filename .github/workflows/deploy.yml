# =============================================================================
# deploy.yml — Production deployment pipeline
# =============================================================================
# Triggers on every push to `main`.
#
# Jobs
# ────
#  lint-and-build   Build + lint the full monorepo (gate for all deploys)
#  deploy-web       Deploy apps/web to Vercel (production)
#  deploy-api       Trigger Render deploy hook for apps/api
#  deploy-worker    Trigger Render deploy hook for apps/worker
#
# Required repository secrets
# ───────────────────────────
#  VERCEL_TOKEN              Vercel personal access token
#  VERCEL_ORG_ID             Vercel team / org ID  (from `vercel env ls`)
#  VERCEL_PROJECT_ID         Vercel project ID for apps/web
#  RENDER_DEPLOY_HOOK_API    Render deploy-hook URL for the API service
#  RENDER_DEPLOY_HOOK_WORKER Render deploy-hook URL for the Worker service
# =============================================================================

name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:        # allow manual re-deploys from the Actions tab

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false  # never cancel an in-flight deploy

# ---------------------------------------------------------------------------
# JOB 1 — Lint & Build (shared gate)
# ---------------------------------------------------------------------------
jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter "@expressiveai/web" lint
        continue-on-error: false

      - name: Type-check API
        run: pnpm --filter "@expressiveai/api" exec tsc --noEmit
        continue-on-error: false

      - name: Build all packages
        run: pnpm build
        env:
          # Next.js needs these at build time for static analysis
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}

      # Cache the Next.js build output so the deploy job can reuse it
      - name: Upload Next.js build artefact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: |
            apps/web/.next
            apps/web/public
          retention-days: 1
          if-no-files-found: error

# ---------------------------------------------------------------------------
# JOB 2 — Deploy Web → Vercel
# ---------------------------------------------------------------------------
  deploy-web:
    name: Deploy Web → Vercel
    needs: lint-and-build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: production
      url: https://expressiveai.online

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        run: |
          vercel pull --yes --environment=production \
            --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/web
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build via Vercel
        run: |
          vercel build --prod \
            --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/web
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy prebuilt artefact to Vercel
        id: vercel-deploy
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --prod \
            --token=${{ secrets.VERCEL_TOKEN }} 2>&1 | tail -1)
          echo "deploy_url=${DEPLOY_URL}" >> $GITHUB_OUTPUT
          echo "✅ Deployed to ${DEPLOY_URL}"
        working-directory: apps/web
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Report deployment URL
        run: echo "### 🌐 Web deployed → ${{ steps.vercel-deploy.outputs.deploy_url }}" >> $GITHUB_STEP_SUMMARY

# ---------------------------------------------------------------------------
# JOB 3 — Deploy API → Render
# ---------------------------------------------------------------------------
  deploy-api:
    name: Deploy API → Render
    needs: lint-and-build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: production

    steps:
      - name: Trigger Render deploy (API)
        run: |
          HTTP_STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" \
            --max-time 30 \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK_API }}")

          echo "Render API deploy hook returned HTTP ${HTTP_STATUS}"

          if [ "$HTTP_STATUS" -ne 200 ] && [ "$HTTP_STATUS" -ne 201 ]; then
            echo "::error::Render API deploy hook failed with HTTP ${HTTP_STATUS}"
            exit 1
          fi

          echo "### 🚀 API deploy triggered on Render (HTTP ${HTTP_STATUS})" >> $GITHUB_STEP_SUMMARY

# ---------------------------------------------------------------------------
# JOB 4 — Deploy Worker → Render
# ---------------------------------------------------------------------------
  deploy-worker:
    name: Deploy Worker → Render
    needs: lint-and-build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: production

    steps:
      - name: Trigger Render deploy (Worker)
        run: |
          HTTP_STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" \
            --max-time 30 \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK_WORKER }}")

          echo "Render Worker deploy hook returned HTTP ${HTTP_STATUS}"

          if [ "$HTTP_STATUS" -ne 200 ] && [ "$HTTP_STATUS" -ne 201 ]; then
            echo "::error::Render Worker deploy hook failed with HTTP ${HTTP_STATUS}"
            exit 1
          fi

          echo "### ⚙️ Worker deploy triggered on Render (HTTP ${HTTP_STATUS})" >> $GITHUB_STEP_SUMMARY
